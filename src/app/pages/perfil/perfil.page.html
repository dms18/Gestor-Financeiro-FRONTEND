<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div *ngIf="usuario" class="ion-padding">
    <div class="avatar-section">
      <ion-avatar>
        <ion-icon name="person-circle" color="primary"></ion-icon>
      </ion-avatar>
      <h2>{{ usuario.nome }}</h2>
      <p>{{ usuario.email }}</p>
    </div>

    <ion-list inset="true">
      <ion-item>
        <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
        <ion-label>
          <p>Nome</p>
          <h3>{{ usuario.nome }}</h3>
        </ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-label>
          <p>Email</p>
          <h3>{{ usuario.email }}</h3>
        </ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="briefcase-outline" slot="start" color="medium"></ion-icon>
        <ion-label>
          <p>Perfil</p>
          <h3>{{ descricaoPerfil(usuario.perfil) }}</h3>
        </ion-label>
      </ion-item>

      <ion-item *ngIf="usuario.cpf">
        <ion-icon name="card-outline" slot="start" color="medium"></ion-icon>
        <ion-label>
          <p>CPF</p>
          <h3>{{ usuario.cpf }}</h3>
        </ion-label>
      </ion-item>

      <ion-item *ngIf="usuario.cnpj">
        <ion-icon name="business-outline" slot="start" color="medium"></ion-icon>
        <ion-label>
          <p>CNPJ</p>
          <h3>{{ usuario.cnpj }}</h3>
        </ion-label>
      </ion-item>
    </ion-list>

    <div class="ion-padding">
      <ion-button expand="block" color="primary" (click)="editar()">
        <ion-icon name="create-outline" slot="start"></ion-icon>
        Editar Perfil
      </ion-button>

      <ion-button expand="block" color="danger" fill="outline" (click)="confirmarLogout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Sair
      </ion-button>
    </div>
  </div>

  <div *ngIf="!usuario && !carregando" class="ion-padding ion-text-center">
    <p>Não foi possível carregar o perfil.</p>
    <ion-button fill="clear" (click)="carregarPerfil()">Tentar novamente</ion-button>
  </div>
</ion-content>
